# render.yaml — Render Blueprint (single service deployment)
# Deploys the entire LeadMind stack (FastAPI + Next.js + nginx) as ONE Docker container.
# Go to render.com → New → Blueprint → connect your GitHub repo.

services:
  - type: web
    name: leadmind
    runtime: docker
    dockerfilePath: Dockerfile        # root monolithic Dockerfile
    dockerContext: .                  # repo root (required for shared modules)
    plan: starter
    envVars:
      - key: mongodb
        sync: false                   # paste Atlas URI in Render dashboard
      - key: NVIDIA_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: BACKEND_BASE_URL
        sync: false                   # set to https://leadmind.onrender.com
      - key: FRONTEND_URL
        sync: false                   # set to https://leadmind.onrender.com (same URL!)
